  let discActiveIdx = 0;

  function discUpdate(idx) {
    const a = albums[idx];
    document.getElementById('disc-glow').style.background = [
      `radial-gradient(ellipse 60% 55% at 20% 60%, ${a.glow[0]} 0%, transparent 70%)`,
      `radial-gradient(ellipse 40% 40% at 75% 30%, ${a.glow[1]} 0%, transparent 70%)`,
      `radial-gradient(ellipse 30% 30% at 55% 80%, ${a.glow[2]} 0%, transparent 60%)`
    ].join(', ');
    document.getElementById('disc-cover-img').src = a.cover;
    document.getElementById('disc-cover-img').alt = a.title.replace(/<br>/g, ' ');
    document.getElementById('disc-type').textContent = a.type;
    document.getElementById('disc-title').innerHTML = a.title;
    document.getElementById('disc-year').textContent = a.year ? 'Beto De Armas · ' + a.year : 'Beto De Armas';
    document.getElementById('disc-links').innerHTML = a.links.map(l =>
      `<div class="disc-link-row"><img class="link-icon" src="${l.icon}" alt=""><a href="${l.href}"${l.href ? ' target="_blank"' : ''}><i>${l.label}</i></a></div>`
    ).join('');
    document.querySelectorAll('.disc-thumb').forEach((el, i) => el.classList.toggle('active', i === idx));
  }

  function discSelect(idx) {
    if (idx === discActiveIdx) return;
    discActiveIdx = idx;
    const inner = document.getElementById('disc-inner');
    inner.classList.add('fading');
    setTimeout(() => { discUpdate(idx); inner.classList.remove('fading'); }, 220);
  }

  (function initDisc() {
    const container = document.getElementById('disc-thumbnails');
    const track = document.createElement('div');
    track.className = 'disc-thumbs-track';

    function makeThumb(a, i, ariaHidden) {
      const btn = document.createElement('button');
      btn.className = 'disc-thumb';
      btn.dataset.idx = i;
      if (ariaHidden) { btn.setAttribute('aria-hidden', 'true'); btn.tabIndex = -1; }
      else btn.setAttribute('aria-label', a.title.replace(/<br>/g, ' '));
      const img = document.createElement('img');
      img.src = a.cover; img.alt = '';
      btn.appendChild(img);
      btn.addEventListener('click', () => discSelect(+btn.dataset.idx));
      return btn;
    }

    albums.forEach((a, i) => track.appendChild(makeThumb(a, i, false)));
    // duplicate set for infinite loop — hidden on desktop via .disc-thumb-clone
    albums.forEach((a, i) => {
      const clone = makeThumb(a, i, true);
      clone.classList.add('disc-thumb-clone');
      track.appendChild(clone);
    });

    container.appendChild(track);
    discUpdate(0);
  })();
