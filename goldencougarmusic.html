<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Cougar Music</title>
</head>

<header>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-position: center;
            background-image: url(/images/cougar.jpg);
            background-size: cover;   /* makes it fill while keeping aspect ratio */
            background-repeat: no-repeat; /* prevents tiling */
        }
        

        #GCM {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(0deg); /* start with rotate(0) */
            animation: spin 60s linear infinite;
        }

        @keyframes spin {
        from {
            transform: translate(-50%, -50%) rotate(0deg);
        }
        to {
            transform: translate(-50%, -50%) rotate(360deg);
        }
        }



          @media (max-width: 768px) {
              #GCM {
                width: 300px;   /* adjust for smaller screens */
                max-width: 65vw;
            }
        }
        



    </style>
</header>


<body>
    <section class="hero-section">
        <img src="/images/GCM.png" id="GCM">
    </section>
</body>
</html>
