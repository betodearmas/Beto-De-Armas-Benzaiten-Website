<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golden Cougar Music</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/style_general.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #0a0800;
      color: #f0e6c8;
      font-family: 'Josefin Sans', sans-serif;
    }

    /* ── Spinning logo ── */
    .gcm-logo {
      width: 220px;
      height: 220px;
      object-fit: contain;
      animation: spin 60s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .gcm-logo { width: 160px; height: 160px; }
    }

    /* ── Hero ── */
    .hero {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 4rem 1.5rem 3rem;
      text-align: center;
      border-bottom: 1px solid #1a1508;
    }

    .logo-placeholder {
      width: 180px;
      height: 180px;
      border: 1px solid #2a2410;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2a2410;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .hero h1 {
      font-family: 'reverie', serif;
      font-size: clamp(2.8rem, 8vw, 6rem);
      color: #c9a84c;
      letter-spacing: 0.05em;
      line-height: 1.1;
    }

    .hero .tagline {
      font-family: 'League Spartan', sans-serif;
      font-weight: 200;
      font-size: 0.85rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #8a7a4a;
    }

    /* ── Artists ── */
    .section-label {
      font-family: 'League Spartan', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #8a7a4a;
      text-align: center;
      padding: 4rem 0 2.5rem;
    }

    .artists-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1px;
      background: #1a1508;
      border-top: 1px solid #1a1508;
      border-bottom: 1px solid #1a1508;
    }

    .artist-card {
      background: #0a0800;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      transition: background 0.25s;
    }
    .artist-card:hover { background: #0f0c02; }

    .artist-card__img-placeholder {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #0e0b02;
      border-bottom: 1px solid #1a1508;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2a2410;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .artist-card__info {
      padding: 1.5rem;
    }

    .artist-card__name {
      font-family: 'League Spartan', sans-serif;
      font-weight: 600;
      font-size: 1.25rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #f0e6c8;
    }

    .artist-card__genre {
      margin-top: 0.3rem;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #4a3e18;
    }

    .artist-card__link {
      display: inline-block;
      margin-top: 1rem;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #c9a84c;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }
    .artist-card__link:hover { border-color: #c9a84c; }

    /* ── Contact ── */
    .contact-section {
      text-align: center;
      padding: 5rem 1.5rem 2rem;
      border-top: 1px solid #1a1508;
    }

    .contact-section h2 {
      font-family: 'reverie', serif;
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      color: #c9a84c;
      margin-bottom: 0.75rem;
    }

    .contact-section p {
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      color: #8a7a4a;
      margin-bottom: 1.5rem;
    }

    .contact-section a.email-link {
      font-family: 'League Spartan', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      color: #f0e6c8;
      text-decoration: none;
      border-bottom: 1px solid #2a2410;
      padding-bottom: 2px;
      transition: border-color 0.2s, color 0.2s;
    }
    .contact-section a.email-link:hover { color: #c9a84c; border-color: #c9a84c; }

    footer {
      text-align: center;
      padding: 2rem 1.5rem;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: #2a2410;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- Hero -->
  <section class="hero">
    <img src="/images/goldencougarmusic/GCM.png" alt="Golden Cougar Music" class="gcm-logo">
    <h1>Golden Cougar Music</h1>
    <p class="tagline">Independent Record Label</p>
  </section>

  <!-- Artists -->
  <p class="section-label">Our Artists</p>

  <div class="artists-grid">

    <!-- Golden Cougar -->
    <div class="artist-card">
      <img class="artist-card__img" src="/images/goldencougarmusic/cougar.jpeg" alt="Aztec Brides">
      <div class="artist-card__info">
        <p class="artist-card__name">Golden Cougar</p>
        <p class="artist-card__genre">— —</p>
        <a href="https://open.spotify.com/artist/1sRfHoSu2rQL9xljjwGoMN?si=M8ZvNJiQQkGfbKBPyFzUmA" class="artist-card__link">Listen ↗</a>
      </div>
    </div>

    <!-- Aztec Brides -->
    <div class="artist-card">
      <img class="artist-card__img" src="/images/goldencougarmusic/AZB.jpg" alt="Aztec Brides">
      <div class="artist-card__info">
        <p class="artist-card__name">Aztec Brides</p>
        <p class="artist-card__genre">— —</p>
        <a href="https://www.aztecbrides.com" class="artist-card__link">Listen ↗</a>
      </div>
    </div>

    <!-- Beto De Armas -->
    <div class="artist-card">
      <img class="artist-card__img" src="/images/beto_bw.jpg" alt="Beto De Armas">
      <div class="artist-card__info">
        <p class="artist-card__name">Beto De Armas</p>
        <p class="artist-card__genre">— —</p>
        <a href="/index.html" class="artist-card__link">Listen ↗</a>
      </div>
    </div>

  </div>

  <!-- Contact -->
  <section class="contact-section">
    <h2>Get in Touch</h2>
    <p>Demos, licensing &amp; press inquiries</p>
    <a href="mailto:dearmas.humberto@gmail.com" class="email-link">Contact</a>
  </section>

  <footer>
    &copy; <span id="yr"></span> Golden Cougar Music. All rights reserved.
  </footer>

  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();
  </script>
</body>
</html>
