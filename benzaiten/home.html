<script>
const SUPABASE_URL = 'https://noaewfpgxhbpkxxucrdj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vYWV3ZnBneGhicGt4eHVjcmRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMzMwNjUsImV4cCI6MjA5NjgwOTA2NX0.L7-NfXEanaXaGNtOgK0EN96URG4tip5C1wyhaw760uo';

document.getElementById('subscriptionForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const btn = this.querySelector('button[type="submit"]');
    const original = btn.textContent;

    btn.disabled = true;
    btn.textContent = 'Subscribing...';

    const res = await fetch(`${SUPABASE_URL}/rest/v1/subscribers`, {
        method: 'POST',
        headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json',
            Prefer: 'return=minimal'
        },
        body: JSON.stringify({ email })
    });

    if (res.ok) {
        btn.textContent = 'Subscribed!';
        document.getElementById('email').value = '';
        setTimeout(() => document.getElementById('popup').style.display = 'none', 1500);
    } else if (res.status === 409) {
        btn.textContent = 'Already subscribed';
        setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 2000);
    } else {
        btn.textContent = 'Something went wrong';
        setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 2000);
    }
});
</script>

<script>
// Set view-transition-name on the clicked band container so the browser
// can morph it into the article hero on navigation.
document.querySelectorAll(
    '.MINUSHAContainer, .BDBContainer, .MODERNOLDContainer, ' +
    '.NORTHERNPELEContainer, .KONNICHIWATYPHOONContainer, ' +
    '.THEPORTALContainer, .VAIWATTContainer, .FUQAContainer, ' +
    '.welcomeToBenzaitenContainer'
).forEach(container => {
    container.querySelector('a').addEventListener('click', () => {
        container.style.viewTransitionName = 'band-hero';
    });
});
</script>
