<header>

<body>

<div class="article-hero">
  <h1 data-i18n="title"></h1>
</div>

<h3 data-i18n="date"></h3>

<div class="article-body">
  <p data-i18n="p1"></p>
</div>

<section class="social-section">
  <h4 class="social-label">Find them on</h4>
  <div class="social-links">
    <a href="#" class="social-link" target="_blank" aria-label="Facebook"><i class="fa-brands fa-facebook"></i></a>

    <a href="#" class="social-link" target="_blank" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a>

  </div>
</section>

<div class="button-container">
  <button id="nextbutton" onclick="location.href=''" data-i18n="next"></button>
  <button id="previousbutton" onclick="location.href=''" data-i18n="prev"></button>
</div>

<section class="comments-section">
  <h2 data-i18n="comments_title"></h2>

  <div id="comments-list" class="comments-list"></div>

  <form class="comments-form">
    <div class="form-group">
      <label for="name" data-i18n="label_name"></label>
      <input type="text" id="name" required>
    </div>

    <div class="form-group">
      <label for="comment" data-i18n="label_comment"></label>
      <textarea id="comment" rows="5" required></textarea>
    </div>

    <button id="submitbutton" data-i18n="submit"></button>
  </form>
</section>

<script>
const translations = {
  en: {
    nav_home: "Home",
    nav_about: "About",
    nav_contact: "Contact",

    title: "Minusha",
    date: "", /* add date here */

    p1: "", /* add article text here */

    next: "NEXT",
    prev: "PREVIOUS",

    comments_title: "Leave a Comment",
    label_name: "Name:",
    label_comment: "Comment:",
    submit: "Submit",
  },

  jp: {
    nav_home: "ホーム",
    nav_about: "当サイトについて",
    nav_contact: "お問い合わせ",

    title: "Minusha",
    date: "", /* add date here */

    p1: "", /* add article text here */

    next: "次へ",
    prev: "前へ",

    comments_title: "コメントをする",
    label_name: "名前：",
    label_comment: "コメント：",
    submit: "送信"
  }
};

const lang = localStorage.getItem("lang") || "en";

document.querySelectorAll("[data-i18n]").forEach(el => {
  el.textContent = translations[lang][el.dataset.i18n];
});
