    date: "Published on June 15, 2026", /* add date here */

    p1: "If you've ever studied a foreign language and asked someone to explain why certain words are right in certain cases and certain words are wrong, and when you ask why, they simply can't explain? \
        They say 'I don't know, it's right because it sounds right, that's just the way it is'. If that ever happened to you, you can begin to understand why Minusha's music feels right even without knowing \
        why. Which brings me to my point: she can write enchanting music and lyrics with complex chords without even really knowing what they are or where they came from, just knowing that they sound good. \
        Indeed, Minusha is a self-taught musician and all-round artist from France, though she has Berber roots and spent years in Edinburgh (which happens to be my favorite city of all time). \
        She combines soft, spacey melodies with a touch of jazz, and then it's like a pop, jazz, r&b, singer-songwriter sundae. I'd be a criminal if I didn't mention that it's her euphoneus vocals - \
        which come in English, French, and even Japanese sometimes - that are truly the cherry on top of that sundae. The way the lines intertwine and play around with each other, sometimes lazily dragging\
        behind the music, and sometimes leaping ahead just enough to make your ears catch that something's different, here and there, is what makes her tunes so unique. It's that quiet complexity that\
        really draws you in.",
        

    p2: "She draws inspiration from nature, from love, frienship, a sunny day. The deep and the mundane, it's all worth singing about in Minusha's world. Maybe that's why I liked it so much. She boasts\

        lay in some European greenfield sipping on white wine and sprite in an afternoon in June while you watch the newborn butterflies catch a drift on the breeze, or just play on repeat while you lay \
