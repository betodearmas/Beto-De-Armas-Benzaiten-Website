const translations = {
  en: {
    nav_home: "Home",

    nav_contact: "Contact",

    title: "FUQA",
    date: "Posted on July 22, 2024",

    p1: "Naa NA NA Naaa NA NA Naa NA NA NA NA NA! Man, these cats are fuckin' GOOD!! My first favorite Tokyo band. I imagine this is what the first people who ever saw the White Stripes play, in some Detroit basement, felt as they inexplicably found themselves singing along the notes to their titular tune. Initially we were all drooling over the sexy drummer, dressed in a thrifted pastel-beige colored dress, accented by frizzy bangs and red lipstick, while the chicks couldn't take their eyes of the guitar player as he wailed on his guitar rolling around on the sticky floor in black and white stripes - perhaps a conscious choice and a reference to their self-awareness as a rocking duo. Being from friendly Osaka, the two were quick to allow me my acquaintanceship, and I've been a fan ever since. There is something about a two-piece band that makes me feel like that's all you really need, if you're good enough. I was impressed by the huge sound, even though they are just two people they filled the entire space with sweet sweet rock. Their heavy riffs surging like lighting about the room, like a Scott Pilgrim sequence, penetrating, uniting the dispersed energy of a tuesday night open mic crowd. They recently put out their first EP, which has 3 or 4 super danceable tracks, and even one love ballad. My favorite track is called 'My Darling' that has a real classic feel to it, but with the added FUQA flavor. It's the kind of music that, even if you've never heard a rock song in your life, and had no such inclination, they would turn you over without your consent and you can now call yourself a rock fan. That's how powerful their music is. Simple, yet at times complex, and catchy as hell, they are bare bones rock and roll. As for the name FUQA - it's a mystery. FUQA. Just sounds good.",
    p2: "Here is a clip from them playing at Ruby Room, a song appropriately called 'na!na!na!'. Like, JUST LISTEN TO THAT SHIT!!!!! Holy fuck they are the perfect house party band. I think I'll throw a party at my house just to hear them play again. But, actually they are pretty active around the greater Tokyo area. If you are nearby I totally recommend you check them out. And this clip just really doesn't do justice to the vibe these guys put on. You need to be there, you need to feel the air vibrating with sound. If you are like me, maybe you thought 'hey, why no bass though?', but man, it's one of the few instances where I think it's actually just perfect as is. As a bass player myself it's a rare thing, I always think you need that extra meat, that oomph, but in this case, these two beautiful people really go all the way in their two-person seater car, blasting off into on-stage mania.",

    next: "NEXT",
    prev: "PREVIOUS",

    comments_title: "Leave a Comment",
    label_name: "Name:",
    label_comment: "Comment:",
    submit: "Submit",
  },

  jp: {
    nav_home: "ホーム",
    nav_about: "当サイトについて",
    nav_contact: "お問い合わせ",

    title: "FUQA",
    date: "2024年7月22日 投稿",

    p1: "こいつら、すげぇいいじゃねえか！私が最初に好きだった東京のバンド。デトロイトの地下室で初めてホワイト・ストライプスのライブを観た人たちが、そのタイトル曲の音符を口ずさんでいるのを不思議に感じたのは、こんな感じだったのではないだろうか。当初、私たちは皆、古着のパステル・ベージュ色のドレスに身を包み、縮れた前髪と赤い口紅がアクセントのセクシーなドラマーによだれを垂らし、一方、白と黒のストライプを意識的に選び、ロック・デュオとしての自意識を表しているのだろう、ベタベタの床を転げ回りながらギターで泣き叫ぶギタリストから目が離せなかった。2人組のバンドというのは、実力さえあればそれでいいと思わせる何かがある。たった2人なのに、空間全体を甘い甘いロックで満たしてしまう巨大なサウンドに感動した。スコット・ピルグリムのシークエンスのように、彼らのヘビーなリフが照明のように部屋中を駆け巡り、浸透し、火曜日の夜のオープンマイクの観客の分散したエネルギーをひとつにした。彼らは最近EPをリリースしました。その中で私は一番好きだったのが「My Darling」という曲でした。1日ずっと聴ける。大阪出身の2人は、すぐに知り合いになることを許してくれた。ロックなんて聴いたこともないし、そんな気もなかったのに、勝手にひっくり返されて、ロック・ファンを名乗れるような音楽だ。それほど彼らの音楽はパワフルなのだ。シンプルでありながら、耳に残り、骨太なロックンロールなのだ。FUQAという名前は謎だ。FUQA。ただ響きがいい。",
    p2: "そして、このクリップは彼らの雰囲気を正しく伝えていない。その場にいて、空気が音で振動しているのを感じる必要がある。しかし、このままでも完璧だと思える数少ない例のひとつだ。ベース奏者としては、このようなことは珍しいことで、いつも余分な肉や力強さが必要だと思うのだが、この場合、この美しい2人は、2人乗りの小さな車に乗って、ステージ上のマニアックな空間に向かって爆走している。これはRuby Roomで演奏している映像で、ライブで見るの最高な「na！na！na！」ナナナだ。を聴いてみてください！彼らは完璧なハウス・パーティー・バンドだ。また彼らの演奏を聴くためにホームパーティやろうかな(笑)。でも、実は彼らは東京近辺でかなり活動しているから、お近くの方は是非見に行ってみてください。",
