<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BENZAITEN</title>
    <link rel="stylesheet" href="/styles/style_benzaiten.css">
</head>
<body>
    <div class="landing-container">
        <picture>
            <source type="image/webp" media="(max-width: 768px)" srcset="/images/webp/welcomelogo-mobile.webp">
            <source type="image/webp" srcset="/images/webp/welcomelogo-desktop.webp">
            <img src="/images/welcomelogo.png" class="welcomelogo" loading="eager">
        </picture>
        <div class="button-container">
            <a href="home.html" class="landing-button" onclick="localStorage.setItem('lang','en')">English</a>
            <a href="home.html" class="landing-button" onclick="localStorage.setItem('lang','jp')">日本語</a>
        </div>
    </div>

<script>
    function setLang(lang) {
    localStorage.setItem("lang", lang);
    }
</script>
</body>
</html>
